services:
  postgres:
    image: postgres:16
    container_name: ecommerce_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ecommerce_dev
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD: ecommerce_pass
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    ports:
      - "6379:6379"

volumes:
  pgdata: